name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Existing full-suite lane preserved — runs every existing test with
  # full extras (dev + contracts-schemas + shared-fixtures), so legacy +
  # contract cross-repo + regression all exercise the real fixture
  # corpus and contracts envelope (no skip).
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (full, incl. cross-repo contracts + shared fixtures)
        run: pip install -e ".[dev,contracts-schemas,shared-fixtures]"
      - name: Tests
        run: python -m pytest

  # Stage-2 plan canonical lanes (project-ult test rollout):
  # - test-fast and smoke install ONLY [dev] so they stay offline-first
  #   per SUBPROJECT_TESTING_STANDARD.md §2.2.
  # - regression separately installs [shared-fixtures] (audit_eval_fixtures
  #   real consumption, no silent module-level skip per iron rule #1).
  # - contract installs [contracts-schemas] for cross-repo alignment
  #   (codex stage-2.3 review #1 fix).
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: test-fast (unit + boundary)
        run: make test-fast

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: smoke
        run: make smoke

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with shared-fixtures git extra)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: regression (must really consume audit_eval_fixtures)
        run: make regression

  # Contract lane includes cross-repo alignment with project-ult-contracts
  # (codex stage-2.3 review #1). Separate from test-fast so the
  # offline-first lane stays network-free; contracts-schemas extra is
  # the only place a git+URL dep shows up here.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with cross-repo contracts-schemas extra)
        run: pip install -e ".[dev,contracts-schemas]"
      - name: contract (incl. cross-repo alignment)
        run: python -m pytest tests/contract -q
